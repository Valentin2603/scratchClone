<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CodeBlock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="zaglav">

</div>
<div class="head">
    <h1 class="wordlogo"> CodeBlock</h1>
    <h2 class="wordlogo">from HITS</h2>
</div>
<div class="container">
    <div class="variants">
        <h3 class="zag"> Варианты команд</h3>
        <ul class="lipstik">
            <li>
                <button class="container-button" draggable="true" data-type="new_value">
                    <div class="content">
                        <p>Объявить переменную</p>
                    </div>
                </button>
            </li>
            <li>
                <button class="container-button" draggable="true" data-type="assign">
                    <div class="content">
                        <p>Присвоить</p>
                    </div>
                </button>
            </li>
            <li>
                <button class="container-button" draggable="true" data-type="IF">
                    <div class="content">
                        <p>IF</p>
                    </div>
                </button>
            </li>
        </ul>
    </div>
    <div class="pole-raboti">
        <h3 class="window-deystviy"> Окно действий</h3>
    </div>
    <div class="terminal">
        <div class="terminal-header">
            <h3 class="nameTerminal">Вывод</h3>
            <button id="runButton">Запустить</button>
        </div>

        <div class="terminal-output"></div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
